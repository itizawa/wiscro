name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            このPRをレビューしてください。以下の観点でコメントを日本語で残してください:
            - バグや潜在的な不具合
            - セキュリティ上の懸念（XSS, SQLi, 認証/認可の抜け等）
            - パフォーマンスの問題
            - Next.js 15 / React のベストプラクティスからの逸脱
            - TypeScript 型の使い方
            - 可読性・保守性の改善提案

            大きな問題がなければ、その旨を簡潔に伝えてください。
          claude_args: |
            --allowed-tools "Bash(gh pr diff:*),Bash(gh pr view:*)"
